{% if request.path == '/' and not request.GET.success_message %}
<section class="intro" id="intro-section">
  <div class="flex flex-col mx-auto h-full">
    <div class="flex justify-center items-center space-x-4 h-full">
      <figure>
        <img src="{{ portfolio.image_file.url }}" alt="{{ portfolio.full_name }}" class="sidebar__avatar">
      </figure>
      <div>
        <h1 class="section__title text-nowrap">{{ portfolio.full_name }}</h1>
        <span class="text__medium block">{{ portfolio.specialization }}</span>
        <span class="line-clamp-3">{{ portfolio.bio }}</span>
      </div>
    </div>
    <a href="{% url 'home:landing_view' %}#main-content" id="toggleHidden" class="mt-auto flex justify-center items-center animate-bounce">
      <div class="relative flex h-10 w-10">
        <span class="w-6 h-6 rounded-full animate-ping absolute inline-flex bg-chartreuse-400"></span>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="relative w-6 h-6 inline-flex">
          <path fill-rule="evenodd" d="M12.53 16.28a.75.75 0 0 1-1.06 0l-7.5-7.5a.75.75 0 0 1 1.06-1.06L12 14.69l6.97-6.97a.75.75 0 1 1 1.06 1.06l-7.5 7.5Z" clip-rule="evenodd" />
        </svg>
      </div>
    </a>
    </div>
  </div>
</section>
{% endif %}
