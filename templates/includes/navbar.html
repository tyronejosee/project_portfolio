{% load i18n %}
<nav class="navbar">
  <section class="navbar__content">
    <!-- Theme Form -->
    <div class="flex space-x-4">
      <form method="post" action="{% url 'home:landing_view' %}" class="flex">{% csrf_token %}
        {{ theme_form }}
        <button type="submit" class="btn btn--primary rounded-s-none">OK</button>
      </form>
    </div>
    <div class="flex space-x-4">
      <form action="{% url 'set_language' %}" method="POST" class="flex">{% csrf_token %}
        <input name="next" type="hidden" value="{{ redirect_to }}" class="hidden">
        <select name="language" class="btn btn--secondary rounded-e-none">
          {% get_current_language as LANGUAGE_CODE %}
          {% get_available_languages as LANGUAGES %}
          {% get_language_info_list for LANGUAGES as languages %}
          {% for language in languages %}
            <option value="{{ language.code }}" {% if language.code == LANGUAGE_CODE %} selected {% endif %}>
              {{ language.code }} - {{ language.name_local }}
            </option>
          {% endfor %}
        </select>
        <input type="submit" value="OK" class="btn btn--primary rounded-s-none">
      </form>
      <a href="{% url 'bookmarks:bookmark_list' %}" class="btn btn--primary">
        <span>{% translate "Bookmarks" %}</span>
      </a>
    </div>
  </section>
</nav>
